<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Just Pop It — SOLAR</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#000; }
  body {
    font-family:'Special Elite', monospace;
    touch-action:none; user-select:none; -webkit-user-select:none;
    color:#9a9f9f;
  }
  #wrap {
    position:fixed; inset:0; display:flex; flex-direction:column;
    padding-top:max(env(safe-area-inset-top, 0px), 52px);
    padding-bottom:env(safe-area-inset-bottom);
  }
  #field-box {
    flex:1; position:relative; margin:10px 8px 6px 8px;
    border:2px solid rgba(255,255,255,0.85);
    border-radius:6px;
    box-shadow:0 0 18px rgba(255,255,255,0.35), inset 0 0 14px rgba(255,255,255,0.12);
    overflow:hidden;
  }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

  #bottom-bar {
    height:96px; position:relative;
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:14px 16px 0 16px;
    color:#9a9f9f;
    font-size:clamp(14px, 4vw, 18px);
    letter-spacing:0.12em;
  }
  #next-area { display:flex; flex-direction:column; gap:6px; }
  #next-queue { display:flex; gap:7px; margin-top:4px; align-items:center; }
  .q-ball {
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #right-area { text-align:right; display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
  #menu-btn, #music-btn { cursor:pointer; }
  #menu-btn:active, #music-btn:active { color:#fff; }

  #launcher {
    position:absolute; left:50%; top:-22px; transform:translateX(-50%);
    width:44px; height:44px; border-radius:50%;
    border:2.5px solid rgba(255,255,255,0.9);
    box-shadow:0 0 10px rgba(255,255,255,0.5);
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #launcher .q-ball { width:34px; height:34px; }
  #launcher-name {
    position:absolute; top:47px; left:50%; transform:translateX(-50%);
    font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
    font-size:13px; letter-spacing:0.08em; white-space:nowrap;
    text-shadow:0 0 6px currentColor;
  }

  #overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px;
    background:rgba(0,0,0,0.5);   /* 반투명: 뒤의 별이 비침 */
    transition:opacity .3s ease;
  }
  #overlay.hidden { opacity:0; pointer-events:none; }
  #overlay h1 {
    font-weight:400; color:#e8eaea;
    font-size:clamp(30px, 8.5vw, 52px);
    letter-spacing:0.1em; text-align:center;
    text-shadow:0 0 14px rgba(255,255,255,0.35);
  }
  #overlay .stats { font-size:clamp(16px, 4.5vw, 22px); letter-spacing:0.15em; text-align:center; line-height:1.9; color:#9a9f9f; }
  #overlay .hint {
    font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
    font-size:clamp(12px, 3.4vw, 14px); color:#6c7171;
    text-align:center; line-height:1.7; max-width:290px;
  }
  #overlay button {
    font-family:'Special Elite', monospace;
    font-size:clamp(17px, 5vw, 22px); letter-spacing:0.18em;
    color:#000; background:#e8eaea;
    border:none; border-radius:4px;
    padding:13px 42px; cursor:pointer;
    box-shadow:0 0 16px rgba(255,255,255,0.4);
  }
  #overlay button:active { transform:translateY(2px); }
  #classic-link {
    color:#6c7171; font-size:clamp(13px,3.8vw,16px); letter-spacing:0.15em;
    text-decoration:none; cursor:pointer;
  }
  #classic-link:active { color:#fff; }
</style>
</head>
<body>
<div id="wrap">
  <div id="field-box">
    <canvas id="game"></canvas>
  </div>
  <div id="bottom-bar">
    <div id="next-area">
      <div>NEXT</div>
      <div id="next-queue"></div>
    </div>
    <div id="launcher"><div class="q-ball" id="launcher-ball"></div><div id="launcher-name"></div></div>
    <div id="right-area">
      <div id="record-label">RECORD&nbsp;&nbsp;0</div>
      <div id="music-btn">&#9834;&nbsp;OFF</div>
      <div id="menu-btn">BACK&nbsp;TO&nbsp;MENU</div>
    </div>
  </div>
</div>

<div id="overlay">
  <h1>SOLAR</h1>
  <div class="stats" id="overlay-stats" style="display:none"></div>
  <div class="hint" id="overlay-hint" style="display:none"></div>
  <button id="start-btn">START</button>
  <button id="resume-btn" style="display:none;margin-top:12px;background:none;border:1px solid #3a3f3f;color:#7a8080;font-size:0.62em;letter-spacing:0.12em;padding:7px 16px;">이어하기</button>
  <div style="display:flex; flex-direction:column; gap:14px; align-items:center; margin-top:26px;">
    <a href="index.html" style="color:#6c7171;font-size:clamp(13px,3.8vw,16px);letter-spacing:0.15em;text-decoration:none;">&#8592;&nbsp;CLASSIC&nbsp;MODE</a>
    <a href="puzzle.html" style="color:#6c7171;font-size:clamp(13px,3.8vw,16px);letter-spacing:0.15em;text-decoration:none;">PUZZLE&nbsp;MODE&nbsp;&#9737;</a>
  </div>
</div>

<script>
// 오프라인 실행 (PWA)
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
<script>
(function(){
  // ───────── 행성 정의 (크기 순) ─────────
  // size: 기본 반지름 배율 / 같은 행성끼리 부딪히면 tier-1로 축소, tier 0(달)끼리는 소멸
  const PLANETS=[
    {name:'달',     color:'#ececec', size:0.62},
    {name:'수성',   color:'#9fb4c7', size:0.72},
    {name:'화성',   color:'#ff1744', size:0.82},
    {name:'금성',   color:'#ffe600', size:0.95},
    {name:'지구',   color:'#2979ff', size:1.08},
    {name:'해왕성', color:'#00e5ff', size:1.22},
    {name:'천왕성', color:'#39ff14', size:1.38},
    {name:'토성',   color:'#ff9100', size:1.62, ring:true},
    {name:'목성',   color:'#ff3df0', size:1.88},
    {name:'태양',   color:'#ffd23b', size:2.25, sun:true}
  ];

  const FRICTION_KEEP = 0.988;
  const FRICTION_SUB = 0.028;
  const STOP_SPEED = 0.05;
  const RESTITUTION = 1.25;
  const WALL_BOUNCE = 0.95;
  const MAX_POWER = 13;
  const POP_RANGE = 1.3;       // 같은 행성 근접 판정 배율
  const POP_TICK = 22;

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const fieldBox = document.getElementById('field-box');
  const nextQueueEl = document.getElementById('next-queue');
  const launcherBallEl = document.getElementById('launcher-ball');
  const recordLabel = document.getElementById('record-label');
  const menuBtn = document.getElementById('menu-btn');
  const musicBtn = document.getElementById('music-btn');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.querySelector('#overlay h1');
  const overlayStats = document.getElementById('overlay-stats');
  const overlayHint = document.getElementById('overlay-hint');
  const startBtn = document.getElementById('start-btn');

  let W=0, H=0, DPR=1, BALL_R=16;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    const rect = fieldBox.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W*DPR; canvas.height = H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    BALL_R = Math.max(13, Math.min(W,H)*0.040);
  }
  window.addEventListener('resize', resize);
  resize();

  // ───────── 사운드 / 음악 (Gymnopédie 로파이) ─────────
  let audioCtx=null;
  let sfxOn=true;
  const SFX_VOL=0.4;
  function sound(freq, dur, type, vol){
    if(!sfxOn) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type||'sine';
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(Math.max(60,freq*0.4), audioCtx.currentTime+dur);
      g.gain.setValueAtTime((vol||0.15)*SFX_VOL, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+dur+0.02);
    }catch(e){}
  }

  const bgm=(function(){
    let ac=null, master=null, timer=null, nextBar=0, barIdx=0, on=false;
    const BPM=64, BEAT=60/BPM, BAR=3*BEAT;
    const accA={bass:43, ch:[59,62,66]};
    const accB={bass:38, ch:[57,61,66]};
    const REST=[];
    const mel=[
      REST, REST,
      [[0,78,1],[1,81,1],[2,79,1]],
      [[0,78,1],[1,73,1],[2,71,1]],
      [[0,73,1],[1,74,1],[2,69,1]],
      [[0,66,3]],
      [[0,78,1],[1,81,1],[2,79,1]],
      [[0,78,1],[1,73,1],[2,71,1]],
      [[0,73,1],[1,74,1],[2,69,1]],
      [[0,69,3]],
      REST, REST
    ];
    const f=m=>440*Math.pow(2,(m-69)/12);
    function ensure(){
      if(ac) return;
      ac=new (window.AudioContext||window.webkitAudioContext)();
      const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2000; lp.Q.value=0.4;
      master=ac.createGain(); master.gain.value=0;
      master.connect(lp); lp.connect(ac.destination);
      const len=ac.sampleRate*2;
      const buf=ac.createBuffer(1,len,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*(Math.random()<0.012?0.5:0.018); }
      const ns=ac.createBufferSource(); ns.buffer=buf; ns.loop=true;
      const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1400;
      const ng=ac.createGain(); ng.gain.value=0.055;
      ns.connect(hp); hp.connect(ng); ng.connect(master);
      ns.start();
    }
    function tone(midi,t,dur,type,vol,attack){
      const o=ac.createOscillator(), g=ac.createGain();
      o.type=type; o.frequency.value=f(midi);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+(attack||0.02));
      g.gain.exponentialRampToValueAtTime(0.0005,t+dur);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t+dur+0.05);
    }
    function scheduleBar(t,idx){
      const acc=(idx%2===0)?accA:accB;
      tone(acc.bass, t, BAR*0.95, 'sine', 0.10, 0.04);
      acc.ch.forEach((m,i)=>{
        tone(m, t+BEAT+i*0.035, BEAT*1.9, 'sine', 0.045, 0.08);
      });
      const bar=mel[idx%mel.length];
      for(const [b,m,len] of bar){
        tone(m, t+b*BEAT, len*BEAT*1.05, 'sine', 0.105, 0.05);
        tone(m+12, t+b*BEAT, len*BEAT, 'sine', 0.018, 0.05);
      }
    }
    function loop(){
      while(nextBar<ac.currentTime+0.8){
        scheduleBar(nextBar,barIdx++);
        nextBar+=BAR;
      }
    }
    return {
      toggle(){
        ensure();
        if(ac.state==='suspended') ac.resume();
        on=!on;
        if(on){
          nextBar=ac.currentTime+0.1; barIdx=0;
          master.gain.cancelScheduledValues(ac.currentTime);
          master.gain.setValueAtTime(master.gain.value, ac.currentTime);
          master.gain.linearRampToValueAtTime(0.9, ac.currentTime+1.5);
          timer=setInterval(loop,200); loop();
        }else{
          master.gain.cancelScheduledValues(ac.currentTime);
          master.gain.setValueAtTime(master.gain.value, ac.currentTime);
          master.gain.linearRampToValueAtTime(0, ac.currentTime+0.6);
          clearInterval(timer);
        }
        return on;
      },
      isOn(){ return on; }
    };
  })();

  // ───────── 게임 상태 ─────────
  let balls=[], particles=[];
  let level=1, popped=0, until=5, record=0;
  let queue=[];          // queue[0]=발사대, [1..3]=NEXT (행성 tier 번호)
  let running=false;
  let aiming=false, aimX=0, aimY=0;
  let pairCooldown = new Map();
  let flashLevel=0;
  let ballSeq=0;

  function quotaFor(lv){ return lv*5; }
  function maxTier(){ return Math.min(level, PLANETS.length)-1; }
  function randTier(){ return Math.floor(Math.random()*(maxTier()+1)); }
  function radiusOf(tier){ return BALL_R*PLANETS[tier].size; }
  function massOf(tier){ const r=PLANETS[tier].size; return r*r*r; }   // 부피 기준: 태양 vs 달 = 약 48배

  function refillQueue(){
    while(queue.length<4) queue.push(randTier());
    renderQueue();
  }
  function qBallStyle(el, tier, px){
    const p=PLANETS[tier];
    el.style.width=px+'px';
    el.style.height=px+'px';
    el.style.border='2px solid '+p.color;
    el.style.boxShadow='0 0 6px '+p.color+', inset 0 0 5px '+p.color;
  }
  function renderQueue(){
    qBallStyle(launcherBallEl, queue[0], Math.round(18+PLANETS[queue[0]].size*8));
    launcherBallEl.textContent='';
    const ln=document.getElementById('launcher-name');
    ln.textContent=PLANETS[queue[0]].name;
    ln.style.color=PLANETS[queue[0]].color;
    nextQueueEl.innerHTML='';
    for(let i=1;i<4;i++){
      const d=document.createElement('div');
      d.className='q-ball';
      qBallStyle(d, queue[i], Math.round(14+PLANETS[queue[i]].size*8));
      nextQueueEl.appendChild(d);
    }
  }

  function updateHUD(){
    recordLabel.innerHTML='RECORD&nbsp;&nbsp;'+record;
  }

  // ── 기록 저장 (SOLAR 전용 키) ──
  function loadRecord(){
    try{ record = parseInt(localStorage.getItem('solar-record')) || 0; }
    catch(e){ record = 0; }
  }
  function loadHistory(){
    try{ return JSON.parse(localStorage.getItem('solar-history')) || []; }
    catch(e){ return []; }
  }
  function saveScore(){
    try{
      localStorage.setItem('solar-record', String(record));
      const h = loadHistory();
      h.push({ s: popped, l: level, d: new Date().toISOString().slice(0,10) });
      h.sort((x,y)=>y.s-x.s);
      localStorage.setItem('solar-history', JSON.stringify(h.slice(0,5)));
    }catch(e){}
  }

  // ── 진행 중 게임 자동 저장/복원 ──
  const SAVE_KEY='solar-save';
  function saveProgress(){
    if(!running) return;
    try{
      const data={ balls, level, popped, until, queue, ballSeq, record };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }catch(e){}
  }
  function clearProgress(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
  function loadProgress(){
    try{
      const raw=localStorage.getItem(SAVE_KEY);
      if(!raw) return null;
      const d=JSON.parse(raw);
      if(!d || !Array.isArray(d.balls) || !Array.isArray(d.queue) || d.queue.length<4) return null;
      return d;
    }catch(e){ return null; }
  }
  function restoreGame(d){
    balls=d.balls||[]; particles=d.particles||[];
    level=d.level||1; popped=d.popped||0; until=d.until||quotaFor(level);
    queue=d.queue; ballSeq=d.ballSeq||0; record=d.record||record;
    pairCooldown.clear(); running=true;
    renderQueue(); updateHUD();
  }

  function newGame(){
    balls=[]; particles=[]; pairCooldown.clear();
    level=1; popped=0; until=quotaFor(1);
    queue=[]; refillQueue();
    running=true;
    updateHUD();
    saveProgress();
  }

  // ───────── 발사 ─────────
  const launcherPos = ()=>({ x: W/2, y: H - BALL_R*0.4 });

  function fire(dx, dy, power){
    const mag = Math.hypot(dx,dy);
    if(mag<0.001) return;
    const lp = launcherPos();
    const tier=queue[0];
    const r=radiusOf(tier);
    // 무게 반영: 같은 힘이라도 무거운 행성은 느리게 출발 (달은 쌩, 태양은 묵직하게)
    const heavy = 1/Math.pow(PLANETS[tier].size, 0.85);
    const v = Math.min(power, MAX_POWER) * heavy;
    balls.push({
      id: ballSeq++,
      x: lp.x, y: lp.y - r,
      vx: dx/mag*v, vy: dy/mag*v,
      tier: tier, r: r,
      armed: false, dead: false
    });
    queue.shift();
    refillQueue();
    sound(220, 0.1, 'triangle', 0.12);
    saveProgress();
  }

  fieldBox.addEventListener('pointerdown', e=>{
    if(!running) return;
    const r = fieldBox.getBoundingClientRect();
    aiming=true;
    aimX=e.clientX-r.left; aimY=e.clientY-r.top;
  });
  fieldBox.addEventListener('pointermove', e=>{
    if(!aiming) return;
    const r = fieldBox.getBoundingClientRect();
    aimX=e.clientX-r.left; aimY=e.clientY-r.top;
  });
  function endAim(){
    if(!aiming || !running){ aiming=false; return; }
    aiming=false;
    const lp = launcherPos();
    const dx = aimX-lp.x, dy = aimY-lp.y;
    if(dy>=-10) return;
    const dist = Math.hypot(dx,dy);
    const power = dist/H * MAX_POWER * 2.1;
    fire(dx, dy, power);
  }
  window.addEventListener('pointerup', endAim);
  window.addEventListener('pointercancel', ()=>{aiming=false;});

  // ───────── 규칙: 같은 행성 → 한 단계 축소, 달끼리 → 소멸 ─────────
  function shrink(b){
    popped++; until--;
    if(popped>record) record=popped;
    if(b.tier===0){
      burst(b);
      b.dead=true;
      sound(560, 0.16, 'sine', 0.2);
    }else{
      b.tier--;
      b.r=radiusOf(b.tier);
      sound(330+b.tier*20, 0.08, 'square', 0.07);
    }
  }

  function levelCheck(){
    if(until<=0){
      level++;
      until=quotaFor(level);
      sound(660, 0.3, 'sine', 0.18);
      flashLevel=1;
      saveProgress();
    }
  }

  function burst(b){
    const p=PLANETS[b.tier];
    const n=Math.floor(16+b.r);
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, s=0.8+Math.random()*3;
      particles.push({x:b.x,y:b.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.4,life:1,size:1+Math.random()*2.6,color:p.color});
    }
  }
  function sparks(x,y,color,count,speed){
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random());
      particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.9+Math.random()*0.3,size:0.7+Math.random()*1.8,color:color});
    }
  }

  function endGame(){
    running=false;
    clearProgress();
    saveScore();
    overlayTitle.textContent='GAME OVER';
    overlayStats.style.display='block';
    const h=loadHistory();
    let rows='';
    for(let i=0;i<h.length;i++){
      rows += (i+1)+'.&nbsp;&nbsp;'+h[i].s+'&nbsp;&nbsp;<span style="font-size:0.75em;color:#6c7171">LV '+h[i].l+' · '+h[i].d+'</span><br>';
    }
    overlayStats.innerHTML='POPPED&nbsp;&nbsp;'+popped+'&nbsp;&nbsp;·&nbsp;&nbsp;LEVEL&nbsp;&nbsp;'+level
      +'<br><br><span style="letter-spacing:0.25em">TOP&nbsp;5</span><br>'+rows;
    overlayHint.style.display='block';
    overlayHint.textContent='행성이 아래 라인을 넘어갔습니다.';
    startBtn.textContent='RETRY';
    overlay.classList.remove('hidden');
    sound(140, 0.5, 'sawtooth', 0.18);
  }

  // ───────── 물리 (질량 기반) ─────────
  function physics(){
    for(const [k,v] of pairCooldown){
      if(v<=1) pairCooldown.delete(k);
      else pairCooldown.set(k, v-1);
    }

    const SUB = 4;
    for(let s=0; s<SUB; s++){
      for(const b of balls){
        b.x += b.vx/SUB;
        b.y += b.vy/SUB;

        if(b.x<b.r){ b.x=b.r; b.vx=Math.abs(b.vx)*WALL_BOUNCE; }
        if(b.x>W-b.r){ b.x=W-b.r; b.vx=-Math.abs(b.vx)*WALL_BOUNCE; }
        if(b.y<b.r){ b.y=b.r; b.vy=Math.abs(b.vy)*WALL_BOUNCE; }

        if(!b.armed && b.y < H - BALL_R*3.2) b.armed=true;

        if(b.armed && b.y - b.r >= H){
          endGame();
          return;
        }
      }

      for(let i=0;i<balls.length;i++){
        for(let j=i+1;j<balls.length;j++){
          const a=balls[i], c=balls[j];
          if(a.dead||c.dead) continue;
          const dx=c.x-a.x, dy=c.y-a.y;
          const dist=Math.hypot(dx,dy), minD=a.r+c.r;
          const popD=minD*POP_RANGE;

          // 같은 행성: 가까이 있는 동안 일정 간격으로 계속 축소
          if(dist<popD && a.tier===c.tier){
            const key=a.id+'-'+c.id;
            if(!pairCooldown.has(key)){
              const col=PLANETS[a.tier].color;
              sparks((a.x+c.x)/2, (a.y+c.y)/2, col, 16, 2.6);
              sparks((a.x+c.x)/2, (a.y+c.y)/2, '#ffffff', 6, 1.8);
              shrink(a); shrink(c);
              if(dist>0.0001){
                const knx=dx/dist, kny=dy/dist;
                const kn=1.5/PLANETS[Math.max(0,a.tier)].size;   // 무거울수록 반동 작게
                a.vx-=knx*kn; a.vy-=kny*kn;
                c.vx+=knx*kn; c.vy+=kny*kn;
              }
              levelCheck();
              pairCooldown.set(key, POP_TICK);
            }
          }

          if(dist<minD && dist>0.0001){
            const nx=dx/dist, ny=dy/dist;
            const m1=massOf(a.tier), m2=massOf(c.tier);
            const total=m1+m2;
            const overlap=(minD-dist);
            // 가벼운 쪽이 더 밀려남
            a.x-=nx*overlap*(m2/total); a.y-=ny*overlap*(m2/total);
            c.x+=nx*overlap*(m1/total); c.y+=ny*overlap*(m1/total);

            // 질량 기반 충격량: 무거운 행성은 덜 흔들리고 가벼운 행성은 팽 튕김
            const rel=(c.vx-a.vx)*nx+(c.vy-a.vy)*ny;
            if(rel<0){
              const jimp=(1+RESTITUTION)*rel/(1/m1+1/m2);
              a.vx+=jimp*nx/m1;
              a.vy+=jimp*ny/m1;
              c.vx-=jimp*nx/m2;
              c.vy-=jimp*ny/m2;

              const impact=-rel;
              if(impact>0.6){
                const cx=(a.x+c.x)/2, cy=(a.y+c.y)/2;
                const cnt=Math.min(14, Math.floor(impact*3));
                sparks(cx, cy, PLANETS[a.tier].color, cnt, impact*0.5);
                sparks(cx, cy, PLANETS[c.tier].color, cnt, impact*0.5);
              }
            }
          }
        }
      }
      balls=balls.filter(b=>!b.dead);
    }

    for(const b of balls){
      const sp = Math.hypot(b.vx,b.vy);
      if(sp>0){
        const ns = Math.max(0, sp*FRICTION_KEEP - FRICTION_SUB);
        if(ns<STOP_SPEED){ b.vx=0; b.vy=0; }
        else { b.vx=b.vx/sp*ns; b.vy=b.vy/sp*ns; }
      }
    }

    for(let pass=0; pass<4; pass++){
      let any=false;
      for(let i=0;i<balls.length;i++){
        for(let j=i+1;j<balls.length;j++){
          const a=balls[i], c=balls[j];
          const dx=c.x-a.x, dy=c.y-a.y;
          let dist=Math.hypot(dx,dy);
          const minD=a.r+c.r;
          if(dist<minD){
            any=true;
            let nx, ny;
            if(dist<0.0001){ const ra=Math.random()*Math.PI*2; nx=Math.cos(ra); ny=Math.sin(ra); dist=0.0001; }
            else { nx=dx/dist; ny=dy/dist; }
            const overlap=(minD-dist)/2 + 0.2;
            a.x-=nx*overlap; a.y-=ny*overlap;
            c.x+=nx*overlap; c.y+=ny*overlap;
            a.x=Math.max(a.r, Math.min(W-a.r, a.x)); if(a.y<a.r) a.y=a.r;
            c.x=Math.max(c.r, Math.min(W-c.r, c.x)); if(c.y<c.r) c.y=c.r;
          }
        }
      }
      if(!any) break;
    }
    updateHUD();
  }

  // ───────── 그리기 ─────────
  function drawHUD(){
    ctx.save();
    ctx.globalAlpha=0.42;
    ctx.fillStyle='#5e6363';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    const labelSize=Math.min(W*0.058, 24);
    const valueSize=Math.min(W*0.17, 80);
    const blocks=[
      ['LEVEL', level, H*0.17],
      ['POPPED', popped, H*0.5],
      ['UNTIL NEXT LEVEL', until, H*0.83]
    ];
    for(const [label, value, cy] of blocks){
      ctx.font=labelSize+'px "Special Elite", monospace';
      ctx.fillText(label, W/2, cy - valueSize*0.62);
      ctx.font=valueSize+'px "Special Elite", monospace';
      ctx.fillText(value, W/2, cy + labelSize*0.55);
    }
    ctx.restore();
  }

  let stars=[];
  function makeStars(){
    stars=[];
    const n = Math.floor(W*H/2600);
    for(let i=0;i<n;i++){
      stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.3+0.3, a:Math.random()*0.7+0.15});
    }
  }
  makeStars();
  window.addEventListener('resize', makeStars);

  function drawBackground(){
    ctx.fillStyle='#050505';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=1;
    const g=18;
    ctx.beginPath();
    for(let x=0;x<=W;x+=g){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
    for(let y=0;y<=H;y+=g){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
    ctx.stroke();
    for(const s of stars){
      ctx.globalAlpha=s.a;
      ctx.fillStyle='#fff';
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    ctx.globalAlpha=1;
  }

  function drawBall(b){
    const p=PLANETS[b.tier];
    ctx.save();
    ctx.translate(b.x,b.y);
    // 토성 고리
    if(p.ring){
      ctx.save();
      ctx.rotate(-0.45);
      ctx.strokeStyle=p.color;
      ctx.globalAlpha=0.55;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.ellipse(0,0,b.r*1.55,b.r*0.5,0,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
    ctx.shadowColor=p.color;
    ctx.shadowBlur=p.sun?22:10;
    ctx.beginPath();
    ctx.arc(0,0,b.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.85)';
    ctx.fill();
    ctx.lineWidth=p.sun?3.4:2.4;
    ctx.strokeStyle=p.color;
    ctx.stroke();
    // 태양 내부 링
    if(p.sun){
      ctx.beginPath();
      ctx.arc(0,0,b.r*0.62,0,Math.PI*2);
      ctx.globalAlpha=0.6;
      ctx.stroke();
      ctx.globalAlpha=1;
    }
    // 행성 이름 (작게)
    ctx.shadowBlur=4;
    ctx.fillStyle=p.color;
    ctx.font=Math.max(9, b.r*0.42)+'px -apple-system, "Apple SD Gothic Neo", sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.name, 0, 1);
    ctx.restore();
  }

  function drawAim(){
    if(!aiming || !running) return;
    const lp=launcherPos();
    const dx=aimX-lp.x, dy=aimY-lp.y;
    const mag=Math.hypot(dx,dy);
    if(mag<1) return;
    const ext=Math.max(W,H)*2;
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.75)';
    ctx.lineWidth=2;
    ctx.shadowColor='rgba(255,255,255,0.8)';
    ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.moveTo(lp.x, lp.y);
    ctx.lineTo(lp.x+dx/mag*ext, lp.y+dy/mag*ext);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(aimX, aimY, 34, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.fill();
    ctx.restore();
  }

  function drawParticles(){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.02; p.life-=0.022;
      if(p.life<=0){ particles.splice(i,1); continue; }
      ctx.globalAlpha=Math.max(0, Math.min(1, p.life));
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha=1;
  }

  function drawLevelFlash(){
    if(flashLevel<=0) return;
    flashLevel-=0.02;
    ctx.save();
    ctx.globalAlpha=Math.max(0, Math.min(flashLevel,0.85));
    ctx.fillStyle='#e8eaea';
    ctx.font=Math.min(W*0.12,44)+'px "Special Elite", monospace';
    ctx.textAlign='center';
    ctx.shadowColor='#fff'; ctx.shadowBlur=16;
    const t = level<=PLANETS.length ? 'LEVEL '+level+' · '+PLANETS[Math.min(level,PLANETS.length)-1].name+' 해금' : 'LEVEL '+level;
    ctx.fillText(t, W/2, H*0.5);
    ctx.restore();
  }

  function loop(){
    drawBackground();
    drawHUD();
    if(running) physics();
    drawAim();
    for(const b of balls) drawBall(b);
    drawParticles();
    drawLevelFlash();
    requestAnimationFrame(loop);
  }
  loop();

  // ───────── 메뉴 ─────────
  loadRecord();
  updateHUD();

  const resumeBtn = document.getElementById('resume-btn');

  // 메뉴(시작) 화면 — START=새 게임, 저장본 있으면 아래 작은 '이어하기'
  function showMenu(){
    running=false;
    overlayTitle.textContent='SOLAR';
    overlayStats.style.display='none';
    overlayHint.style.display='none';
    startBtn.textContent='START';
    resumeBtn.style.display = loadProgress() ? 'inline-block' : 'none';
    overlay.classList.remove('hidden');
  }
  function beginGame(fresh){
    overlay.classList.add('hidden');
    overlayStats.style.display='none';
    resize();
    if(fresh){ newGame(); }
    else { const saved=loadProgress(); if(saved) restoreGame(saved); else newGame(); }
    if(!bgm.isOn()){ bgm.toggle(); sfxOn=true; musicBtn.innerHTML='&#9834;&nbsp;ON'; }
  }

  // 앱을 끄거나 뒤로 가는 등 화면을 벗어날 때 즉시 저장
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') saveProgress(); });
  window.addEventListener('pagehide', saveProgress);
  window.addEventListener('beforeunload', saveProgress);

  startBtn.addEventListener('click', ()=>{ clearProgress(); beginGame(true); });
  resumeBtn.addEventListener('click', ()=>{ beginGame(false); });
  musicBtn.addEventListener('click', ()=>{
    const o=bgm.toggle();
    sfxOn=o;
    musicBtn.innerHTML = o ? '&#9834;&nbsp;ON' : '&#9834;&nbsp;OFF';
  });
  menuBtn.addEventListener('click', ()=>{
    saveProgress();
    showMenu();
  });

  // 시작 시: 저장본 있으면 '이어하기' 메뉴 표시
  showMenu();
})();
</script>
</body>
