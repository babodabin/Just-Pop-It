<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Just Pop It</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Just Pop It">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#000; }
  body {
    font-family:'Special Elite', monospace;
    touch-action:none; user-select:none; -webkit-user-select:none;
    color:#9a9f9f;
  }
  #bg { position:fixed; inset:0; width:100%; height:100%; display:block; z-index:0; }

  #menu {
    position:fixed; inset:0; z-index:1;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:max(env(safe-area-inset-top,0px),40px) 24px env(safe-area-inset-bottom);
    gap:38px;
  }
  /* 제목 */
  #title {
    text-align:center; line-height:1.05;
  }
  #title .big {
    display:block; font-size:clamp(40px, 13vw, 78px); color:#e8eaea;
    letter-spacing:0.08em; text-shadow:0 0 18px rgba(255,255,255,0.4);
  }
  #title .sub {
    display:block; margin-top:10px; font-size:clamp(11px,3.2vw,14px);
    letter-spacing:0.4em; color:#6c7171;
  }

  /* 모드 버튼들 */
  #modes { display:flex; flex-direction:column; gap:18px; width:100%; max-width:330px; }
  .mode {
    display:flex; align-items:center; justify-content:center; gap:12px;
    text-decoration:none; color:#e8eaea;
    font-size:clamp(18px,5.2vw,24px); letter-spacing:0.16em;
    padding:18px 20px; border-radius:10px;
    border:2px solid var(--c); background:rgba(0,0,0,0.45);
    box-shadow:0 0 14px var(--g), inset 0 0 10px var(--g);
    transition:transform .08s ease, box-shadow .2s ease;
  }
  .mode:active { transform:translateY(2px) scale(0.99); }
  .mode .ic { font-size:1.15em; line-height:1; filter:drop-shadow(0 0 6px var(--c)); }
  .mode.classic { --c:#00e5ff; --g:rgba(0,229,255,0.30); }
  .mode.solar   { --c:#ff8400; --g:rgba(255,132,0,0.30); }
  .mode.puzzle  { --c:#39ff14; --g:rgba(57,255,20,0.28); }

  /* 음악 토글 */
  #music {
    cursor:pointer; color:#9a9f9f; letter-spacing:0.18em;
    font-size:clamp(13px,3.8vw,16px); padding:8px 18px;
    border:1px solid #3a3f3f; border-radius:8px; background:rgba(0,0,0,0.4);
  }
  #music:active { color:#fff; }
  #music.on { color:#e8eaea; border-color:#6c7171; box-shadow:0 0 10px rgba(255,255,255,0.18); }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="menu">
  <div id="title">
    <span class="big">JUST&nbsp;POP&nbsp;IT</span>
    <span class="sub">SELECT&nbsp;MODE</span>
  </div>
  <div id="modes">
    <a class="mode classic" href="classic.html"><span class="ic">&#9679;</span>CLASSIC</a>
    <a class="mode solar"   href="solar.html"><span class="ic">&#9728;</span>SOLAR</a>
    <a class="mode puzzle"  href="puzzle.html"><span class="ic">&#9737;</span>PUZZLE</a>
  </div>
  <div id="music">&#9834;&nbsp;MUSIC&nbsp;ON</div>
</div>
<script>
  const $=id=>document.getElementById(id);

  // ── 별 배경 (게임 화면과 같은 느낌) ──
  const canvas=$('bg'), ctx=canvas.getContext('2d');
  let W=0,H=0,DPR=1,stars=[];
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    stars=[];
    const n=Math.floor(W*H/2600);
    for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.3,a:Math.random()*0.7+0.15,tw:Math.random()*0.02+0.005,ph:Math.random()*Math.PI*2});
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    // 옅은 그리드
    ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1; ctx.beginPath();
    const g=18;
    for(let x=0;x<=W;x+=g){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
    for(let y=0;y<=H;y+=g){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
    ctx.stroke();
    // 별 (살짝 반짝)
    for(const s of stars){
      const a=s.a*(0.6+0.4*Math.sin(t*s.tw+s.ph));
      ctx.fillStyle='rgba(255,255,255,'+a.toFixed(3)+')';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize(); requestAnimationFrame(draw);
  window.addEventListener('resize', resize);

  // ── 배경음악 엔진 (게임과 동일) ──
  const bgm=(function(){
    let ac=null, master=null, timer=null, nextBar=0, barIdx=0, on=false;
    const BPM=64, BEAT=60/BPM, BAR=3*BEAT;
    const accA={bass:43, ch:[59,62,66]};
    const accB={bass:38, ch:[57,61,66]};
    const REST=[];
    const mel=[
      REST, REST,
      [[0,78,1],[1,81,1],[2,79,1]],
      [[0,78,1],[1,73,1],[2,71,1]],
      [[0,73,1],[1,74,1],[2,69,1]],
      [[0,66,3]],
      [[0,78,1],[1,81,1],[2,79,1]],
      [[0,78,1],[1,73,1],[2,71,1]],
      [[0,73,1],[1,74,1],[2,69,1]],
      [[0,69,3]],
      REST, REST
    ];
    const f=m=>440*Math.pow(2,(m-69)/12);
    function ensure(){
      if(ac) return;
      ac=new (window.AudioContext||window.webkitAudioContext)();
      const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2000; lp.Q.value=0.4;
      master=ac.createGain(); master.gain.value=0;
      master.connect(lp); lp.connect(ac.destination);
      const len=ac.sampleRate*2;
      const buf=ac.createBuffer(1,len,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*(Math.random()<0.012?0.5:0.018); }
      const ns=ac.createBufferSource(); ns.buffer=buf; ns.loop=true;
      const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1400;
      const ng=ac.createGain(); ng.gain.value=0.055;
      ns.connect(hp); hp.connect(ng); ng.connect(master);
      ns.start();
    }
    function tone(midi,t,dur,type,vol,attack){
      const o=ac.createOscillator(), g=ac.createGain();
      o.type=type; o.frequency.value=f(midi);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+(attack||0.02));
      g.gain.exponentialRampToValueAtTime(0.0005,t+dur);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t+dur+0.05);
    }
    function scheduleBar(t,idx){
      const acc=(idx%2===0)?accA:accB;
      tone(acc.bass, t, BAR*0.95, 'sine', 0.10, 0.04);
      acc.ch.forEach((m,i)=>{ tone(m, t+BEAT+i*0.035, BEAT*1.9, 'sine', 0.045, 0.08); });
      const bar=mel[idx%mel.length];
      for(const [b,m,len] of bar){
        tone(m, t+b*BEAT, len*BEAT*1.05, 'sine', 0.105, 0.05);
        tone(m+12, t+b*BEAT, len*BEAT, 'sine', 0.018, 0.05);
      }
    }
    function loop(){
      while(nextBar<ac.currentTime+0.8){ scheduleBar(nextBar,barIdx++); nextBar+=BAR; }
    }
    return {
      toggle(){
        ensure();
        if(ac.state==='suspended') ac.resume();
        on=!on;
        if(on){
          nextBar=ac.currentTime+0.1; barIdx=0;
          master.gain.cancelScheduledValues(ac.currentTime);
          master.gain.setValueAtTime(master.gain.value, ac.currentTime);
          master.gain.linearRampToValueAtTime(0.9, ac.currentTime+1.5);
          timer=setInterval(loop,200); loop();
        }else{
          master.gain.cancelScheduledValues(ac.currentTime);
          master.gain.setValueAtTime(master.gain.value, ac.currentTime);
          master.gain.linearRampToValueAtTime(0, ac.currentTime+0.6);
          clearInterval(timer);
        }
        return on;
      },
      isOn(){ return on; }
    };
  })();

  // ── 음악 ON/OFF (설정 저장 + 첫 페이지에서도 재생) ──
  function getMusic(){ try{ return localStorage.getItem('jpi-music')!=='off'; }catch(e){ return true; } }
  function setMusic(on){ try{ localStorage.setItem('jpi-music', on?'on':'off'); }catch(e){} }
  function renderMusic(){
    const on=getMusic();
    $('music').innerHTML='&#9834;&nbsp;MUSIC&nbsp;'+(on?'ON':'OFF');
    $('music').classList.toggle('on', on);
  }
  $('music').addEventListener('click', (e)=>{
    e.stopPropagation();
    const want=!getMusic();
    setMusic(want); renderMusic();
    if(bgm.isOn()!==want) bgm.toggle();
  });
  renderMusic();

  // 브라우저 자동재생 차단 때문에, 첫 탭(아무 곳이나) 시 음악 시작
  function firstStart(){
    if(getMusic() && !bgm.isOn()) bgm.toggle();
    document.removeEventListener('pointerdown', firstStart);
  }
  document.addEventListener('pointerdown', firstStart);
</script>
</body>
</html>
